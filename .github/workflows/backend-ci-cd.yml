name: Backend CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run migrations check
      env:
        SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
        DEBUG: 'False'
        DATABASE_URL: 'sqlite:///test_db.sqlite3'
      run: |
        python manage.py makemigrations --check --dry-run

    - name: Run Django tests
      env:
        SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
        DEBUG: 'False'
        DATABASE_URL: 'sqlite:///test_db.sqlite3'
      run: |
        python manage.py test

    - name: Check for security issues
      run: |
        pip install safety
        safety check --json || true

  deploy:
    name: Deploy to Heroku
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Deploy to Heroku
      env:
        HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
      run: |
        git remote add heroku https://heroku:$HEROKU_API_KEY@git.heroku.com/$HEROKU_APP_NAME.git
        git push heroku HEAD:main -f

    - name: Deployment success notification
      if: success()
      run: |
        echo "✅ Backend deployed successfully to Heroku!"
        echo "App URL: https://${{ secrets.HEROKU_APP_NAME }}.herokuapp.com"
        echo "Migrations will run automatically via Procfile release phase"

    - name: Deployment failure notification
      if: failure()
      run: |
        echo "❌ Backend deployment failed. Check the logs above."
